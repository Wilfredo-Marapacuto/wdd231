<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Confirmation</title>
  <meta name="description" content="Confirmation page for advanced HTML form activity">
  <meta name="author" content="Wilfredo Marapacuto">
  <link rel="stylesheet" href="../styles/small.css">
  <script src="../scripts/confirmation.js" defer></script>
</head>
<body>
  <header>
    <h1>Form Confirmation</h1>
  </header>

  <main>
    <section class="confirmation-card">
      <h2>Your Submitted Information</h2>

      <p><strong>First Name:</strong> <span id="firstName"></span></p>
      <p><strong>Last Name:</strong> <span id="lastName"></span></p>
      <p><strong>Email:</strong> <span id="email"></span></p>
      <p><strong>Phone Number:</strong> <span id="phone"></span></p>
      <p><strong>Birth Date:</strong> <span id="birthDate"></span></p>
      <p><strong>Favorite Program Area:</strong> <span id="program"></span></p>
      <p><strong>Preferred Study Mode:</strong> <span id="studyMode"></span></p>
      <p><strong>Interests:</strong> <span id="interest"></span></p>
      <p><strong>Comments:</strong> <span id="comments"></span></p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Wilfredo Marapacuto</p>
  </footer>
</body>
</html>
